program: run_demo.py
method: grid

metric:
  name: val/MRR
  goal: maximize

parameters:
  walk_length:
    values: [8, 16, 32, 64]
  num_layers:
    values: [1, 2]
  dropout:
    values: [0.0, 0.1]

  # fixed — best from phase 1
  walk_encoder:      { value: mamba  }
  d_state:           { value: 8      }
  d_conv:            { value: 4      }
  expand:            { value: 2      }
  window_size:       { value: 8      }
  sample_rate:       { value: 1.0    }
  hidden_dim:        { value: 128    }
  mlp_num_layers:    { value: 3      }
  mlp_dropout:       { value: 0.1    }
  neg_sample_ratio:  { value: 1      }
  lr:                { value: 0.001  }
  global_batch_size: { value: 64     }
  grad_clip_norm:    { value: 0.1    }
  num_heads:         { value: 4      }
  mlp_ratio:         { value: 1      }
  seed:              { value: 2025   }
  num_epochs:        { value: 300    }
  patience:          { value: 20     }
  wb_project:        { value: neuralwalker-mamba-phase2 }
