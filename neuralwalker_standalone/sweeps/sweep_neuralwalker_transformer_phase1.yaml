program: run_demo.py
method: grid

metric:
  name: val/MRR
  goal: maximize

parameters:
  num_heads:
    values: [2, 4, 8]
  mlp_ratio:
    values: [1, 2]
  walk_length:
    values: [8, 16, 32]

  # fixed
  walk_encoder:      { value: transformer }
  lr:                { value: 0.0003 }
  global_batch_size: { value: 64    }
  window_size:       { value: 8     }
  num_layers:        { value: 2     }
  hidden_dim:        { value: 128   }
  dropout:           { value: 0.1   }
  mlp_num_layers:    { value: 3     }
  mlp_dropout:       { value: 0.1   }
  neg_sample_ratio:  { value: 1     }
  sample_rate:       { value: 1.0   }
  grad_clip_norm:    { value: 0.1   }
  seed:              { value: 2025  }
  num_epochs:        { value: 300   }
  patience:          { value: 20    }
  wb_project:        { value: neuralwalker-transformer-phase1 }
