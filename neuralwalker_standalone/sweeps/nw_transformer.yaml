program: run_demo.py

# Best NeuralWalker-Transformer config on Cora link prediction
# Tuned via 2-phase grid search (sweep_neuralwalker_transformer_phase1/2.yaml)
# Best val MRR: 0.3747

parameters:
  # Sequence layer
  walk_encoder:      { value: transformer }
  num_heads:         { value: 8     }
  mlp_ratio:         { value: 1     }

  # Walk
  walk_length:       { value: 16    }
  window_size:       { value: 8     }
  sample_rate:       { value: 1.0   }

  # Architecture
  num_layers:        { value: 1     }
  hidden_dim:        { value: 128   }
  dropout:           { value: 0.1   }
  mlp_num_layers:    { value: 3     }
  mlp_dropout:       { value: 0.1   }

  # Optimizer
  lr:                { value: 0.0003 }
  global_batch_size: { value: 64    }
  grad_clip_norm:    { value: 0.1   }
  neg_sample_ratio:  { value: 1     }

  # Training
  seed:              { value: 2025  }
  num_epochs:        { value: 300   }
  patience:          { value: 20    }
  wb_project:        { value: neuralwalker-transformer-final }
