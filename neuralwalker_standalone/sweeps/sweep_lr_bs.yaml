program: run_demo.py
method: grid

metric:
  name: val/MRR
  goal: maximize

parameters:
  lr:
    values: [0.0001, 0.0003, 0.001, 0.003]
  global_batch_size:
    values: [64, 128, 256, 512]

  # fixed for this sweep
  seed:           { value: 2025 }
  num_epochs:     { value: 300  }
  patience:       { value: 20   }
  hidden_dim:     { value: 128  }
  num_layers:     { value: 1    }
  walk_length:    { value: 8    }
  window_size:    { value: 4    }
  dropout:        { value: 0.1  }
  mlp_num_layers: { value: 3    }
  mlp_dropout:    { value: 0.1  }
  grad_clip_norm: { value: 0.1  }
  wb_project:     { value: neuralwalker-cora-sweep-lr-bs }
