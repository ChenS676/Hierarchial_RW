program: run_demo.py
method: grid

metric:
  name: val/MRR
  goal: maximize

parameters:
  walk_length:
    values: [8, 16, 32]
  window_size:
    values: [4, 8]
  num_layers:
    values: [1, 2]

  # fixed — best from lr/bs sweep
  lr:                { value: 0.001  }
  global_batch_size: { value: 64     }

  seed:           { value: 2025 }
  num_epochs:     { value: 300  }
  patience:       { value: 20   }
  hidden_dim:     { value: 128  }
  dropout:        { value: 0.1  }
  mlp_num_layers: { value: 3    }
  mlp_dropout:    { value: 0.1  }
  grad_clip_norm: { value: 0.1  }
  wb_project:     { value: neuralwalker-cora-sweep-arch }
