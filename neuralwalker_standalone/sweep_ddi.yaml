program: /fs/gpfs41/lv11/fileset01/pool/pool-shao/micromamba_root/envs/nw_mamba/bin/python
command:
  - ${program}
  - run_ddi.py
  - ${args}
method: grid
metric:
  name: best_val_Hits@20
  goal: maximize

parameters:
  lr:
    values: [0.0001, 0.0003, 0.001, 0.003, 0.005, 0.01]
  global_batch_size:
    values: [1024, 2048, 4096, 8192, 16384, 32768, 65536]

  # Fixed
  hidden_dim:
    value: 128
  num_layers:
    value: 2
  walk_length:
    value: 16
  window_size:
    value: 8
  walk_encoder:
    value: conv
  dropout:
    value: 0.3
  d_conv:
    value: 9
  mlp_num_layers:
    value: 3
  mlp_dropout:
    value: 0.1
  grad_clip_norm:
    value: 1.0
  num_epochs:
    value: 200
  patience:
    value: 30
  wb_project:
    value: neuralwalker-ddi-sweep
